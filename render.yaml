# Blueprint de Render: https://render.com/docs/blueprint-spec
# Despliega con "New > Blueprint" y conecta este repositorio.

databases:
  - name: pet-adoption-db
    plan: free
    databaseName: pet_adoption
    user: pet_adoption

services:
  - type: web
    name: pet-adoption
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # Debe ser la salida de: php artisan key:generate --show
      # (generateValue de Render NO produce el formato base64: que exige Laravel)
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: pet-adoption-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
